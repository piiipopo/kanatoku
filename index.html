<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ぴこさんのかなトク！管理</title>
    <script src="https://tailwindcss.com"></script>
    
    <!-- アイコン（カート🛒）の設定 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236366f1'/><text y='72' x='15' font-size='65'>🛒</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236366f1'/><text y='72' x='15' font-size='65'>🛒</text></svg>">
    <link rel="manifest" href="data:application/json,{'name':'かなトク！管理','short_name':'かなトク！','start_url':'.','display':'standalone','icons':[{'src':'data:image/svg+xml,<svg xmlns=\'http://w3.org\' viewBox=\'0 0 100 100\'><rect width=\'100\' height=\'100\' rx=\'22\' fill=\'%236366f1\'/><text y=\'72\' x=\'15\' font-size=\'65\'>🛒</text></svg>','sizes':'192x192','type':'image/svg+xml'}]}">

    <style>
        body { touch-action: manipulation; }
        input[type="number"], input[type="text"], input[type="date"] { font-size: 16px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-24">

    <!-- ヘッダー（合計獲得還元額） -->
    <header class="bg-white shadow-sm sticky top-0 z-10 p-4 border-b border-gray-100">
        <h1 class="text-center text-[13px] font-bold text-gray-500 mb-1">ぴこさんのかなトク！ 総合計獲得還元額</h1>
        <div class="text-center text-4xl font-extrabold text-indigo-600 tracking-tight">
            <span id="grand-total">0</span><span class="text-lg font-bold ml-1 text-gray-400">円</span>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <!-- アプリ別ステータス -->
        <section class="mb-4">
            <h2 class="text-sm font-bold text-gray-600 mb-3 flex items-center gap-1.5">
                <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-indigo-500">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 1 0 7.5 7.5h-7.5V6Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0 0 13.5 3v7.5Z" />
                </svg>
                アプリ別還元状況
            </h2>
            <div id="status-container" class="grid grid-cols-2 gap-3">
                <!-- JavaScriptで動的生成 -->
            </div>
        </section>

        <!-- 【追加】対象店舗検索リンクボタン -->
        <section class="mb-6">
            <a href="https://pref.kanagawa.jp" target="_blank" rel="noopener noreferrer" 
               class="flex items-center justify-between w-full bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-xl p-3 text-indigo-700 transition-all active:scale-98">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-indigo-600">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.604 10.604Z" />
                    </svg>
                    <span class="text-xs font-bold">かなトク！公式で対象店舗を検索</span>
                </div>
                <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5 text-indigo-500">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                </svg>
            </a>
        </section>

        <!-- 入力フォーム -->
        <section class="bg-white rounded-2xl shadow-sm p-5 mb-6 border border-gray-100">
            <h2 class="text-sm font-bold text-gray-600 mb-4 flex items-center gap-1.5">
                <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-indigo-500">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
                買い物を記録する
            </h2>
            <form id="record-form">
                <!-- 決済アプリ選択 -->
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-500 mb-2">決済アプリを選択</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="cursor-pointer relative">
                            <input type="radio" name="app_select" value="aeon" class="peer sr-only" checked>
                            <div class="rounded-xl border-2 border-gray-100 py-2.5 text-center peer-checked:border-fuchsia-700 peer-checked:bg-fuchsia-50 transition-all active:scale-95">
                                <div class="font-bold text-xs text-gray-500 peer-checked:text-fuchsia-700">AEON Pay</div>
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="app_select" value="paypay" class="peer sr-only">
                            <div class="rounded-xl border-2 border-gray-100 py-2.5 text-center peer-checked:border-red-500 peer-checked:bg-red-50 transition-all active:scale-95">
                                <div class="font-bold text-xs text-gray-500 peer-checked:text-red-500">PayPay</div>
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="app_select" value="rakuten" class="peer sr-only">
                            <div class="rounded-xl border-2 border-gray-100 py-2.5 text-center peer-checked:border-red-700 peer-checked:bg-red-50 transition-all active:scale-95">
                                <div class="font-bold text-xs text-gray-500 peer-checked:text-red-700">楽天ペイ</div>
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="app_select" value="aupay" class="peer sr-only">
                            <div class="rounded-xl border-2 border-gray-100 py-2.5 text-center peer-checked:border-orange-500 peer-checked:bg-orange-50 transition-all active:scale-95">
                                <div class="font-bold text-xs text-gray-500 peer-checked:text-orange-500">au PAY</div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 還元率の選択 -->
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-500 mb-2">店舗の還元率</label>
                    <div class="flex gap-2">
                        <label class="cursor-pointer relative flex-1">
                            <input type="radio" name="rate_select" value="10" class="peer sr-only" checked>
                            <div class="rounded-xl border-2 border-gray-100 py-2 text-center peer-checked:border-indigo-500 peer-checked:bg-indigo-50 transition-all active:scale-95">
                                <div class="font-bold text-sm text-gray-500 peer-checked:text-indigo-600">10%還元</div>
                            </div>
                        </label>
                        <label class="cursor-pointer relative flex-1">
                            <input type="radio" name="rate_select" value="20" class="peer sr-only">
                            <div class="rounded-xl border-2 border-gray-100 py-2 text-center peer-checked:border-emerald-500 peer-checked:bg-emerald-50 transition-all active:scale-95">
                                <div class="font-bold text-sm text-gray-500 peer-checked:text-emerald-600">20%還元</div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 日付と店名（横並び） -->
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5" for="date">お買い物日</label>
                        <input type="date" id="date" required
                            class="w-full bg-slate-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1.5" for="shop">店舗名 <span class="text-[10px] font-normal text-gray-400">(任意)</span></label>
                        <input type="text" id="shop" placeholder="例: まいばす"
                            class="w-full bg-slate-50 border border-gray-200 rounded-xl p-3 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder:text-gray-300">
                    </div>
                </div>

                <!-- 金額入力（復元） -->
                <div class="mb-5">
                    <label class="block text-xs font-bold text-gray-500 mb-1.5" for="amount">買い物金額 (税込)</label>
                    <div class="relative flex items-center">
                        <input type="number" id="amount" inputmode="numeric" required placeholder="0"
                            class="w-full bg-slate-50 border border-gray-200 rounded-xl p-3.5 pr-10 text-lg font-bold text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder:text-gray-300">
